#
# Settings page
# 设置页面
#
[settings_page]
theme = "dark"

#
# General
# 通用
#
[general]
# 悬浮工具栏
floating_toolbar = true
# Emoji
enable_emoji = true
# 翻页方式
paging_minus_equal = true
paging_comma_period = false
paging_tab = true
paging_page_up_down = true
candidate_arrow_navigation = true
# 中英混输
cn_en_mixed_input = false
# 极简模式。极简模式下，候选窗口使用 d2d 绘制，界面只作展示候选项，无其他功能。
clean_mode = false

#
# Appearance
# 外观
#
[appearance]
# 主题模式，可选："dark", "light", "system"
theme_mode = "dark"
# 字体
font = "Noto Sans SC"
# 缺省字体，如果系统中没有找到指定字体，则使用缺省字体
default_font = "Microsoft YaHei"
# 字体大小
font_size = 14
# 每页候选词数量，可选：3, 4, 5, 6, 7, 8, 9, 10
page_size = 8
# 候选窗口跟随光标
candidate_window_follow_cursor = true
# 候选窗口排列方式，可选："vertical", "horizontal"
candidate_window_layout = "vertical"

#
# Input
# 输入
#
[input]
# 组合说明：
#   legacy + shuangpin -> 使用旧版双拼会话实现（当前最稳定）
#   legacy + quanpin   -> 自动切换为新版引擎全拼会话
#   engine + shuangpin -> 使用新版引擎双拼会话
#   engine + quanpin   -> 使用新版引擎全拼会话
#   任意 backend + wubi -> 当前暂不支持
# 会话后端，可选："legacy", "engine"
# session_backend = "legacy"
session_backend = "engine"
# 输入方案，可选："quanpin", "shuangpin", "wubi"
schema = "shuangpin"
# schema = "quanpin"
# engine + shuangpin 时的 preedit 显示方式，可选："quanpin", "shuangpin"
#   quanpin   -> 预编辑显示转换后的全拼分词
#   shuangpin -> 预编辑显示原始双拼输入串
shuangpin_preedit_mode = "shuangpin"
# 双拼方案，可选："xiaohe", "ziranma"
shuangpin_schema = "xiaohe"
# 五笔方案，可选："wubi86", "wubi98"
wubi_schema = "wubi86"

#
# Helpcode
# 辅助码
#
[helpcode]
# 双拼辅助码
shuangpin_helpcode = true
# 双拼辅助码方案，可选："lantian", "ziranma"
shuangpin_helpcode_schema = "lantian"
# 是否在候选窗口中显示双拼辅助码
show_sp_helpcode_in_candidate_window = true
# 全拼辅助码
quanpin_helpcode = true
# 全拼辅助码方案，可选："lantian", "ziranma"
quanpin_helpcode_schema = "lantian"
# 是否在候选窗口中显示全拼辅助码
show_qp_helpcode_in_candidate_window = true

#
# Keybindings
# 快捷键
#
[keybindings]
# 切换中英文输入法，数组中的元素可选："Ctrl+Space", "Shift"
switch_language = ["Ctrl+Space", "Shift"]

#
# Dictionary
# 词库
#
[dictionary]
# 词库路径
dictionary_path = "./assets/dictionaries/cutted_flyciku_with_jp.db"

#
# Skin
# 皮肤
#
[skin]
# 皮肤名称
skin_name = "default"

#
# Voice Input
# 语音输入
#
[voice_input]
# 语音输入
voice_input = true

#
# Soft Keyboard
# 屏幕键盘
#
[soft_keyboard]
theme_mode = "dark"
background_img = "" # 默认是空，没有背景图片

#
# Utility
# 实用功能
#
[utility]
clipboard_history = "false"
study_english_word = "false" # 背单词功能，开启后可以在候选项旁边显示英文

#
# AI Assistant
# AI 辅助
#
[ai_assistant]
enable = "false"
